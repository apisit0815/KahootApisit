<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Quiz Game System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Kanit', sans-serif; }
    .btn-option { transition: all 0.2s; }
    .btn-option:active:not(:disabled) { transform: scale(0.95); }
    .btn-option:disabled { opacity: 0.6; cursor: not-allowed; }
    .fade-in { animation: fadeIn 0.5s ease-in; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .status-dot { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 12px; font-weight: bold; transition: all 0.3s; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center p-4">

  <div class="w-full max-w-2xl bg-white shadow-lg rounded-xl p-6 mb-6 text-center">
    <h1 class="text-3xl font-bold text-blue-600">🎮 Quiz Speed Game</h1>
    <p class="text-gray-500">ตอบให้ไว ถูกให้เป๊ะ เพื่อคะแนนสูงสุด!</p>
  </div>

  <div id="loading" class="text-xl animate-pulse text-blue-500 font-bold">กำลังเชื่อมต่อฐานข้อมูล...</div>

  <div id="app" class="w-full max-w-2xl hidden fade-in">
    
    <div id="section-landing" class="bg-white p-8 rounded-xl shadow-md text-center">
      <h2 class="text-2xl font-bold mb-6 text-gray-700 border-b pb-4">กรุณาเลือกสถานะ</h2>
      <div class="grid grid-cols-1 gap-4">
        <button onclick="showStudentLogin()" class="bg-blue-500 text-white py-4 rounded-xl font-bold text-xl hover:bg-blue-600 shadow-lg transform hover:-translate-y-1 transition">🙋‍♂️ ฉันเป็นนักเรียน</button>
        <button onclick="showTeacherAuth()" class="bg-gray-700 text-white py-4 rounded-xl font-bold text-xl hover:bg-gray-800 shadow-lg transform hover:-translate-y-1 transition">👨‍🏫 ฉันเป็นคุณครู</button>
      </div>
    </div>

    <div id="section-teacher-auth" class="hidden bg-white p-8 rounded-xl shadow-md text-center">
      <button onclick="showLanding()" class="text-sm text-gray-400 hover:text-gray-600 mb-4 block underline">← กลับ</button>
      <h2 class="text-xl font-bold mb-4 text-gray-800">รหัสลับสำหรับคุณครู</h2>
      <input type="password" id="teacher-password" placeholder="ใส่รหัสลับที่นี่..." class="w-full border-2 p-3 rounded-lg mb-4 text-center text-lg focus:border-gray-800 outline-none">
      <button onclick="verifyTeacher()" class="w-full bg-gray-800 text-white py-3 rounded-lg font-bold text-lg hover:bg-black">ยืนยันรหัสผ่าน</button>
    </div>

    <div id="section-login" class="hidden bg-white p-8 rounded-xl shadow-md text-center">
      <button onclick="showLanding()" class="text-sm text-gray-400 hover:text-gray-600 mb-4 block underline">← กลับ</button>
      <h2 class="text-xl mb-4 font-bold text-gray-800">ชื่อที่จะใช้ในเกม</h2>
      <input type="text" id="player-name" placeholder="ใส่ชื่อเล่นของคุณ..." class="w-full border-2 p-3 rounded-lg mb-4 text-center text-lg focus:border-blue-400 outline-none">
      <button onclick="joinGame()" class="w-full bg-green-500 text-white py-3 rounded-lg font-bold text-lg hover:bg-green-600 shadow-md">เข้าสู่เกม</button>
    </div>

    <div id="section-waiting" class="hidden bg-white p-8 rounded-xl shadow-md text-center">
      <div class="mb-4 text-6xl animate-bounce">⏳</div>
      <h2 class="text-2xl font-bold mb-2">ยินดีต้อนรับ</h2>
      <p id="player-welcome" class="text-blue-500 font-bold text-xl mb-4"></p>
      <p class="text-gray-400">กรุณารอคุณครูเปิดระบบเพื่อเริ่มคำถาม...</p>
    </div>

    <div id="section-playing" class="hidden space-y-4">
      <div class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white p-5 rounded-2xl shadow-xl">
        <div class="flex justify-between items-center mb-4">
          <span id="q-number" class="font-bold text-xl bg-blue-800 px-4 py-1 rounded-lg">ข้อที่ -</span>
          <div id="timer-display" class="bg-red-500 text-white px-4 py-1 rounded-lg font-bold text-xl animate-pulse">เวลา: 5 วิ</div>
          <span id="player-score-display" class="bg-yellow-500 text-yellow-900 px-4 py-1 rounded-lg font-bold">0 คะแนน</span>
        </div>
        <div class="flex flex-wrap gap-2 justify-center bg-black/20 p-3 rounded-xl shadow-inner" id="history-tracker"></div>
      </div>

      <div class="bg-white p-8 rounded-2xl shadow-lg border-b-4 border-blue-200">
        <h2 id="q-text" class="text-2xl font-bold mb-8 text-gray-800 text-center leading-relaxed">กำลังเตรียมคำถาม...</h2>
        <div id="options-grid" class="grid grid-cols-1 gap-4"></div>
      </div>
      <div id="feedback" class="text-center font-bold text-xl p-4 rounded-xl hidden shadow-md"></div>
    </div>

    <div id="section-finished" class="hidden bg-white p-8 rounded-xl shadow-2xl text-center">
      <h2 class="text-4xl font-bold text-yellow-500 mb-6 drop-shadow-md">🏆 จบการแข่งขัน</h2>
      <div id="leaderboard" class="space-y-3 text-left mb-8 max-h-64 overflow-y-auto pr-2"></div>
      <div id="personal-rank" class="mb-6 p-4 bg-blue-50 rounded-xl font-bold text-blue-700 text-xl border-2 border-blue-100"></div>
      <button onclick="location.reload()" class="bg-gray-100 hover:bg-gray-200 text-gray-600 px-8 py-3 rounded-full font-bold transition">ออกจากสนาม</button>
    </div>

    <div id="section-teacher" class="hidden bg-gray-900 text-white p-6 rounded-2xl shadow-2xl border-t-4 border-yellow-500">
      <div class="flex justify-between items-center mb-6 border-b border-gray-700 pb-4">
        <h2 class="text-xl font-bold">👨‍🏫 แผงควบคุม</h2>
        <button onclick="location.reload()" class="text-xs bg-red-600 px-3 py-1 rounded-full hover:bg-red-500 font-bold">Logout</button>
      </div>
      <div class="grid grid-cols-2 gap-4 mb-8">
        <button onclick="teacherAction('start')" class="bg-green-600 p-5 rounded-2xl font-bold hover:bg-green-500 shadow-lg active:scale-95 transition">เริ่มเกมใหม่<br><span class="text-xs font-normal">(ล้างข้อมูล+สุ่มใหม่)</span></button>
        <button onclick="teacherAction('next')" class="bg-blue-600 p-5 rounded-2xl font-bold hover:bg-blue-500 shadow-lg active:scale-95 transition">ไปข้อถัดไป<br><span class="text-xs font-normal">(Next Step)</span></button>
        <button onclick="teacherAction('reset')" class="bg-red-700 p-3 rounded-xl font-bold col-span-2 opacity-80 hover:opacity-100 mt-2">รีเซ็ตกระดานคำถาม (Reset)</button>
      </div>
      <div id="teacher-stats" class="text-sm bg-black/40 p-5 rounded-2xl space-y-2 border border-white/10"></div>
    </div>

  </div>

  <script>
    // ⚠️ นำ URL ของ Web App จาก Google Apps Script มาใส่ตรงนี้
    const WEB_APP_URL = "YOUR_WEB_APP_URL_HERE"; 

    let role = 'landing';
    let isTeacherAuth = false;
    let gameState = null;
    let questions = []; 
    let playerName = '';
    let pollInterval = null;

    // Timer Variables
    let countdownInterval = null;
    let timeLeft = 5;
    let localCurrentQ = -1; // เพื่อเช็คว่ามีการเปลี่ยนข้อหรือยัง

    window.onload = function() {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      startPolling();
    };

    // ฟังก์ชันสำหรับยิง API ไปหา Google Apps Script
    async function apiCall(action, data = {}) {
      const payload = { action, ...data };
      try {
        const res = await fetch(WEB_APP_URL, {
          method: 'POST',
          body: JSON.stringify(payload)
        });
        return await res.json();
      } catch (err) {
        console.error("API Error:", err);
        return null;
      }
    }

    function startPolling() {
      if(pollInterval) clearInterval(pollInterval);
      pollInterval = setInterval(refreshState, 2000); // อัปเดตทุก 2 วิ
      refreshState();
    }

    async function refreshState() {
      const state = await apiCall('getState');
      if(state && !state.error) {
        gameState = state;
        if(state.activeQuestions) questions = state.activeQuestions;
        updateUI();
      }
    }

    function showLanding() { role = 'landing'; updateUI(); }
    function showTeacherAuth() { role = 'teacher-auth'; updateUI(); }
    function showStudentLogin() { role = 'student-login'; updateUI(); }

    function verifyTeacher() {
      if(document.getElementById('teacher-password').value === 'teacher1234') { 
        isTeacherAuth = true; role = 'teacher'; updateUI(); 
      } else alert('รหัสผ่านไม่ถูกต้อง!');
    }

    function joinGame() {
      const input = document.getElementById('player-name').value.trim();
      if(!input) return alert('กรุณาใส่ชื่อของคุณ');
      playerName = input; role = 'student';
      document.getElementById('player-welcome').innerText = "สวัสดีครับ คุณ " + playerName;
      updateUI();
    }

    function updateUI() {
      if(!gameState) return;
      const sections = ['section-landing', 'section-teacher-auth', 'section-login', 'section-waiting', 'section-playing', 'section-finished', 'section-teacher'];
      sections.forEach(s => document.getElementById(s).classList.add('hidden'));

      if(role === 'landing') document.getElementById('section-landing').classList.remove('hidden');
      else if(role === 'teacher-auth') document.getElementById('section-teacher-auth').classList.remove('hidden');
      else if(role === 'teacher' && isTeacherAuth) {
        document.getElementById('section-teacher').classList.remove('hidden');
        renderTeacherStats();
      }
      else if(role === 'student-login') document.getElementById('section-login').classList.remove('hidden');
      else if(role === 'student') {
        if(gameState.status === 'waiting') document.getElementById('section-waiting').classList.remove('hidden');
        else if(gameState.status === 'playing') {
          document.getElementById('section-playing').classList.remove('hidden');
          renderQuestion();
        }
        else if(gameState.status === 'finished') {
          document.getElementById('section-finished').classList.remove('hidden');
          renderLeaderboard();
        }
      }
    }

    function startTimer() {
      clearInterval(countdownInterval);
      timeLeft = 5;
      const timerDisplay = document.getElementById('timer-display');
      timerDisplay.innerText = `เวลา: ${timeLeft} วิ`;
      timerDisplay.classList.remove('bg-gray-500');
      timerDisplay.classList.add('bg-red-500', 'animate-pulse');

      countdownInterval = setInterval(() => {
        timeLeft--;
        if(timeLeft > 0) {
          timerDisplay.innerText = `เวลา: ${timeLeft} วิ`;
        } else {
          // หมดเวลา
          clearInterval(countdownInterval);
          timerDisplay.innerText = "หมดเวลา!";
          timerDisplay.classList.remove('bg-red-500', 'animate-pulse');
          timerDisplay.classList.add('bg-gray-500');
          
          // ล็อคปุ่มคำตอบทั้งหมด
          document.querySelectorAll('.btn-option').forEach(btn => btn.disabled = true);
          
          const feedback = document.getElementById('feedback');
          const playerData = gameState.players[playerName] || { lastAnswered: -1 };
          
          // ถ้ายังไม่ได้ตอบ ให้แสดงว่าหมดเวลาและรอครู
          if(playerData.lastAnswered !== gameState.currentQ) {
            feedback.classList.remove('hidden');
            feedback.innerText = "หมดเวลาตอบ! กรุณารอคุณครูเปลี่ยนข้อถัดไป...";
            feedback.className = "text-center font-bold text-lg text-red-600 bg-red-50 p-4 rounded-2xl border-2 border-red-200 mt-4";
          }
        }
      }, 1000);
    }

    function renderQuestion() {
      const qIdx = gameState.currentQ;
      if(!questions || questions.length === 0 || !questions[qIdx]) return;

      // ตรวจสอบว่าครูเปลี่ยนข้อใหม่หรือยัง ถ้าเปลี่ยนแล้วให้รีเซ็ตเวลา
      if(localCurrentQ !== qIdx) {
        localCurrentQ = qIdx;
        startTimer();
      }

      const q = questions[qIdx];
      document.getElementById('q-number').innerText = `ข้อที่ ${qIdx + 1} / ${questions.length}`;
      document.getElementById('q-text').innerText = q.q;
      
      const playerData = gameState.players[playerName] || { lastAnswered: -1, score: 0, history: {} };
      document.getElementById('player-score-display').innerText = `${playerData.score} คะแนน`;

      const tracker = document.getElementById('history-tracker');
      tracker.innerHTML = '';
      questions.forEach((_, i) => {
        const dot = document.createElement('div');
        const ansStatus = playerData.history ? playerData.history[i] : undefined;
        dot.className = "status-dot ";
        if(ansStatus === true) { dot.classList.add('bg-green-400', 'text-white', 'shadow-lg'); dot.innerText = '✓'; }
        else if(ansStatus === false) { dot.classList.add('bg-red-400', 'text-white'); dot.innerText = '✕'; }
        else if(i === qIdx) { dot.classList.add('bg-white', 'text-blue-600', 'animate-pulse', 'scale-110'); dot.innerText = i+1; }
        else { dot.classList.add('bg-blue-900/40', 'text-blue-200'); dot.innerText = i+1; }
        tracker.appendChild(dot);
      });

      const grid = document.getElementById('options-grid');
      // สร้างปุ่มใหม่เฉพาะตอนเปลี่ยนข้อเพื่อลดการกระตุกของหน้าจอ
      if(grid.children.length === 0 || grid.dataset.qIndex !== qIdx.toString()) {
        grid.innerHTML = '';
        grid.dataset.qIndex = qIdx;
        q.options.forEach((opt, idx) => {
          const btn = document.createElement('button');
          btn.className = "btn-option bg-gray-50 hover:bg-blue-600 hover:text-white border-2 border-gray-100 p-5 rounded-2xl text-left font-semibold text-gray-700 shadow-sm text-lg";
          btn.innerText = (idx + 1) + ". " + opt;
          btn.onclick = () => submitAns(idx);
          // ถ้าหมดเวลาไปแล้วในขณะที่ poll กลับมา ให้ disable ไว้
          if(timeLeft <= 0) btn.disabled = true;
          grid.appendChild(btn);
        });
      }

      const feedback = document.getElementById('feedback');
      if(playerData.lastAnswered === qIdx) {
        // ถ้านักเรียนตอบไปแล้ว ให้ซ่อนปุ่มและแสดงสถานะ
        grid.innerHTML = '';
        feedback.classList.remove('hidden');
        feedback.innerText = "บันทึกคำตอบแล้ว! กรุณารอคุณครูเปลี่ยนข้อถัดไป...";
        feedback.className = "text-center font-bold text-lg text-blue-600 bg-blue-50 p-4 rounded-2xl border-2 border-blue-200 mt-4";
        clearInterval(countdownInterval); // หยุดนับเวลาเมื่อตอบแล้ว
        document.getElementById('timer-display').innerText = "ส่งคำตอบแล้ว";
        document.getElementById('timer-display').classList.remove('bg-red-500', 'animate-pulse');
        document.getElementById('timer-display').classList.add('bg-green-500');
      } else if (timeLeft > 0) {
        feedback.classList.add('hidden');
      }
    }

    async function submitAns(idx) {
      if(timeLeft <= 0) return; // ป้องกันการแอบส่งผ่าน console ตอนหมดเวลา
      
      // ปิดปุ่มทันทีเพื่อป้องกันการกดเบิ้ล
      document.querySelectorAll('.btn-option').forEach(btn => btn.disabled = true);
      
      const qIdx = gameState.currentQ;
      const correctIdx = questions[qIdx].ans;
      
      const newState = await apiCall('submitAnswer', { playerName, qIndex: qIdx, answerIndex: idx, correctIndex: correctIdx });
      if(newState) {
        gameState = newState;
        updateUI();
      }
    }

    function renderLeaderboard() {
      const board = document.getElementById('leaderboard');
      board.innerHTML = '';
      const players = Object.entries(gameState.players).sort((a, b) => b[1].score - a[1].score);
      players.forEach(([name, data], i) => {
        const div = document.createElement('div');
        div.className = `flex justify-between items-center p-4 rounded-2xl mb-2 ${name === playerName ? 'bg-blue-600 text-white shadow-lg scale-105' : 'bg-gray-50'}`;
        div.innerHTML = `<div class="flex items-center"><span class="w-8 font-bold">${i+1}.</span> <span>${name}</span></div> <span class="font-bold">${data.score} แต้ม</span>`;
        board.appendChild(div);
        if(name === playerName) document.getElementById('personal-rank').innerText = `🏆 คุณได้อันดับที่ ${i+1} จากทั้งหมด ${players.length} คน`;
      });
    }

    function renderTeacherStats() {
      const stats = document.getElementById('teacher-stats');
      const playerCount = Object.keys(gameState.players).length;
      stats.innerHTML = `
        <div class="flex justify-between"><span>🔴 สถานะเกม:</span><span class="text-yellow-400 font-bold">${gameState.status.toUpperCase()}</span></div>
        <div class="flex justify-between"><span>📝 ข้อที่กำลังทำ:</span><span class="text-blue-400 font-bold">${gameState.currentQ + 1} / ${questions.length}</span></div>
        <div class="flex justify-between"><span>👥 ผู้เล่นเข้าห้อง:</span><span class="text-green-400 font-bold">${playerCount} คน</span></div>
      `;
    }

    async function teacherAction(type) {
      if(type === 'reset' && !confirm('ต้องการรีเซ็ตและล้างข้อมูลผู้เล่นทั้งหมด?')) return;
      const newState = await apiCall('teacherAction', { type });
      if(newState) {
        gameState = newState;
        updateUI();
      }
    }
  </script>
</body>
</html>
